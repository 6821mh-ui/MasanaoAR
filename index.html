<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR名刺</title>

  <!-- MindAR + Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.7/dist/mindar-image-three.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    body, html { margin:0; overflow:hidden; }
    #startButton {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 25px;
      font-size: 18px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<button id="startButton">タップして開始</button>

<script>
document.getElementById("startButton").addEventListener("click", async () => {

  document.getElementById("startButton").style.display = "none";

  const mindarThree = new window.MINDAR.IMAGE.MindARThree({
    container: document.body,
    imageTargetSrc: "marker/marker.mind",
  });

  const {renderer, scene, camera} = mindarThree;

  // アンカー
  const anchor = mindarThree.addAnchor(0);

  // ===== 音声 =====
  const listener = new THREE.AudioListener();
  camera.add(listener);

  const sound = new THREE.Audio(listener);
  const audioLoader = new THREE.AudioLoader();

  audioLoader.load("assets/voice.mp3", (buffer) => {
    sound.setBuffer(buffer);
    sound.setLoop(false);
    sound.setVolume(1.0);
  });

  // ===== 3Dモデル =====
  const loader = new THREE.GLTFLoader();
  loader.load("scene/model.glb", (gltf) => {
    const model = gltf.scene;

    model.scale.set(0.4, 0.4, 0.4);
    model.rotation.y = Math.PI;

    anchor.group.add(model);
  });

  // ===== マーカー検出 =====
  anchor.onTargetFound = () => {
    if (!sound.isPlaying) {
      sound.play();
    }
  };

  anchor.onTargetLost = () => {
    sound.stop();
  };

  await mindarThree.start();

  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });

});
</script>

</body>
</html>
